apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: inference-gateway
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: europe-west1-docker.pkg.dev/project-192493f2-913e-4971-86c/inference-gateway/gateway:v0.1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: REDIS_URL
              value: "redis:6379"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10