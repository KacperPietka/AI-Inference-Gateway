services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=:8080
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - DEFAULT_MODEL=tinyllama
    depends_on: []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q0-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s